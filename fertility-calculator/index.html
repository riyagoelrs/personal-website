<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fern — Fertility Calculator</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
body{margin:0;background:#FAF7F2;font-family:Georgia,serif;color:#2A2420}button{cursor:pointer}.wrap{max-width:900px;margin:0 auto;padding:40px}.card{background:white;border:1px solid #E8E0D8;border-radius:6px;padding:28px;margin-top:24px}.hero{font-size:56px;font-weight:300;line-height:1.05}.accent{color:#C9897A;font-style:italic}.btn{background:#2A2420;color:#fff;border:none;padding:16px 24px;border-radius:4px;font-size:15px}.result{font-size:48px;color:#C9897A;font-weight:300}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.input{width:100%;padding:12px;border:1px solid #E8E0D8;background:#FAF7F2}.small{font-size:12px;color:#8B817A;line-height:1.7}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
function App(){
const [cycles,setCycles]=useState(1);
const [storage,setStorage]=useState(5);
const [result,setResult]=useState(null);
const calculate=()=>{
const total=(16500*cycles)+(600*storage);
setResult(total);
}
return (
<div className='wrap'>
<div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
<div style={{fontSize:28,fontWeight:300}}>fern</div>
<div style={{fontSize:11,letterSpacing:'0.2em',textTransform:'uppercase',color:'#8B817A'}}>Fertility Finance</div>
</div>
<div style={{marginTop:60}}>
<div style={{fontSize:11,letterSpacing:'0.2em',textTransform:'uppercase',color:'#C9897A',marginBottom:16}}>Know your real number</div>
<div className='hero'>What will fertility <span className='accent'>actually cost you?</span></div>
<p className='small' style={{maxWidth:540,marginTop:24}}>Estimate egg freezing and IVF costs, insurance gaps, storage fees, and financing scenarios.</p>
</div>
<div className='card'>
<div className='grid'>
<div>
<label>Egg Freezing Cycles</label>
<input className='input' type='range' min='1' max='4' value={cycles} onChange={(e)=>setCycles(Number(e.target.value))} />
<div>{cycles} cycle(s)</div>
</div>
<div>
<label>Years of Storage</label>
<input className='input' type='range' min='1' max='10' value={storage} onChange={(e)=>setStorage(Number(e.target.value))} />
<div>{storage} years</div>
</div>
</div>
<button className='btn' style={{marginTop:24}} onClick={calculate}>Calculate Costs →</button>
{result && (
<div style={{marginTop:40,paddingTop:24,borderTop:'1px solid #E8E0D8'}}>
<div style={{fontSize:12,letterSpacing:'0.2em',textTransform:'uppercase',color:'#8B817A'}}>Estimated Out-of-Pocket</div>
<div className='result'>${result.toLocaleString()}</div>
<p className='small'>Includes retrieval, medications, monitoring, and storage assumptions.</p>
</div>
)}
</div>
</div>
)
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
