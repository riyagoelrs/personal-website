<!DOCTYPE html>
<html lang="en">

<style>
:root {
  --paper: #f7f5e8;
  --paper-2: #efe9d4;
  --ink: #1a1410;
  --ink-soft: #5a4a3a;
  --ink-faint: #9a8a72;
  --rule: #d8cdb0;
  --wine: #6e1811;
  --wine-soft: #9c3b2a;
  --kiss: #b4291f;
  --terracotta: #c97a4f;
  --sage: #8a9b7a;
  --rose: #d4a5a0;
  --oat: #d8c8a8;
  --tape: rgba(110, 24, 17, 0.18);
}
@media (prefers-color-scheme: dark) {
  :root { --paper: #1a1410; --paper-2: #251c16; --ink: #f0e8d4; --ink-soft: #c8b89a; --ink-faint: #7a6a52; --rule: #3a2e22; --wine: #d4564a; --wine-soft: #e8a87c; --kiss: #d4564a; }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { font-family: 'Kantumruy Pro', system-ui, sans-serif; background: var(--paper); color: var(--ink); line-height: 1.7; min-height: 100vh; overflow-x: hidden; }
.page { display: grid; grid-template-columns: 1fr; gap: 2rem; max-width: 64rem; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
@media (min-width: 880px) { .page { grid-template-columns: 13rem 1fr; gap: 4rem; padding: 3.5rem 2.5rem 5rem; } }
.rail { display: flex; flex-direction: column; gap: 1rem; }
.rail .thumb { width: 5.5rem; height: 5.5rem; border-radius: 0.25rem; background: var(--paper-2) center/cover no-repeat; background-image: url('https://sxhodsrixg8meuri.public.blob.vercel-storage.com/workshop/7814764f-32d2-418c-b945-a9336eda76e9/screenshot_2026-05-09_at_3.05.17_am-egEt3Yos5R5VN2jdDwULd4oicLVr2V.png'); }
.rail .name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink); margin-top: 0.4rem; font-weight: 500; }
.rail nav { display: flex; flex-direction: column; gap: 0.55rem; margin-top: 0.85rem; }
.rail nav a { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); text-decoration: none; transition: color 0.18s; padding: 0.05rem 0; font-weight: 500; }
.rail nav a:hover, .rail nav a.active { color: var(--ink); }
@media (min-width: 880px) { .rail { position: sticky; top: 3.5rem; align-self: start; } }
.col { min-width: 0; }
.typed-wrap { font-family: 'Courier Prime', monospace; font-size: 1.02rem; line-height: 1.95; margin-bottom: 2rem; min-height: 11rem; max-width: 38rem; }
.typed-wrap p { margin-bottom: 1rem; }
.typed-wrap a { color: var(--wine); text-decoration: none; border-bottom: 1px solid var(--rule); }
.typed-wrap a:hover { border-bottom-color: var(--wine); color: var(--wine-soft); }
.cursor { display: inline-block; width: 0.55ch; height: 1.05em; background: var(--ink); vertical-align: text-bottom; margin-left: 1px; animation: blink 1s step-end infinite; }
.cursor.hidden { display: none; }
@keyframes blink { 50% { opacity: 0; } }
@media (min-width: 600px) { .typed-wrap { font-size: 1.05rem; } }

.desk-wrap { margin-top: 0.5rem; padding-top: 1.25rem; border-top: 1px dashed var(--rule); }
.desk-label { font-size: 0.7rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 1rem; font-family: 'Kantumruy Pro', sans-serif; }
.desk { position: relative; width: 100%; height: 38rem; }
@media (min-width: 600px) { .desk { height: 36rem; } }
.desk-item { position: absolute; opacity: 0; will-change: transform, opacity; }
.desk-item.settled { animation: drop 1s cubic-bezier(0.2, 0.8, 0.3, 1) forwards; }
@keyframes drop { 0% { opacity: 0; transform: translate3d(var(--fx, 0), var(--fy, -120vh), 0) rotate(var(--fr, -40deg)) scale(0.85); } 60% { opacity: 1; } 100% { opacity: 1; transform: translate3d(0, 0, 0) rotate(var(--rot, 0deg)) scale(1); } }

/* gallery frames — ciaragan-inspired */
.frame { padding: 0.6rem; background: var(--paper); position: relative; box-shadow: 0 8px 22px rgba(0,0,0,0.22), 0 1px 2px rgba(0,0,0,0.1); }
.frame::before { content: ''; position: absolute; inset: 0.25rem; border: 1px solid var(--ink); pointer-events: none; }
.frame::after { content: ''; position: absolute; inset: 0.4rem; border: 1px solid var(--ink); opacity: 0.35; pointer-events: none; }
.frame img { display: block; width: 100%; height: 100%; object-fit: cover; filter: saturate(0.96) contrast(0.98); }
.frame.sm { width: 7rem; }
.frame.md { width: 9rem; }
.frame.lg { width: 11rem; }
.frame.sm img { height: 7rem; }
.frame.md img { height: 9rem; }
.frame.lg img { height: 12rem; }
.frame .cap { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.78rem; letter-spacing: 0.04em; color: var(--ink); text-align: center; margin-top: 0.45rem; line-height: 1.1; padding: 0 0.2rem; }

/* corner ornaments on lg frame */
.frame.lg .corner { position: absolute; width: 0.7rem; height: 0.7rem; border: 1px solid var(--ink); }
.frame.lg .corner.tl { top: 0.55rem; left: 0.55rem; border-right: 0; border-bottom: 0; }
.frame.lg .corner.tr { top: 0.55rem; right: 0.55rem; border-left: 0; border-bottom: 0; }
.frame.lg .corner.bl { bottom: 1.5rem; left: 0.55rem; border-right: 0; border-top: 0; }
.frame.lg .corner.br { bottom: 1.5rem; right: 0.55rem; border-left: 0; border-top: 0; }

/* rounded museum-mat frame for one image */
.frame.oval { border-radius: 50%; padding: 0; box-shadow: 0 6px 18px rgba(0,0,0,0.25); width: 8.5rem; height: 8.5rem; background: transparent; }
.frame.oval::before, .frame.oval::after { display: none; }
.frame.oval .matte { width: 100%; height: 100%; border-radius: 50%; background: var(--paper); border: 6px solid var(--paper); box-shadow: inset 0 0 0 1px var(--ink); overflow: hidden; }
.frame.oval img { border-radius: 50%; }
.frame.oval .cap { position: absolute; bottom: -1.2rem; left: 0; right: 0; }

.note { padding: 0.85rem 0.9rem 1rem; font-family: 'Kalam', cursive; line-height: 1.35; color: #1a1410; box-shadow: 0 4px 14px rgba(0,0,0,0.16), 0 1px 1px rgba(0,0,0,0.08); position: relative; }
.note.sticky { background: var(--oat); width: 9rem; font-size: 0.88rem; }
.note.lined { background: #fbfaf6; width: 11rem; font-size: 0.9rem; padding: 0.8rem 0.9rem 0.95rem 1.4rem; background-image: repeating-linear-gradient(transparent, transparent 1.3rem, rgba(110, 24, 17, 0.18) 1.3rem, rgba(110, 24, 17, 0.18) 1.32rem), linear-gradient(to right, transparent 1rem, rgba(200, 80, 80, 0.5) 1rem, rgba(200, 80, 80, 0.5) 1.04rem, transparent 1.04rem); }
.note.craft { background: var(--terracotta); color: #f7f5e8; width: 8.5rem; font-size: 0.85rem; }
.note .src { display: block; margin-top: 0.4rem; font-family: 'Courier Prime', monospace; font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; }
.note::before { content: ''; position: absolute; top: -0.4rem; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 2.6rem; height: 0.6rem; background: var(--tape); }

.scribble { font-family: 'Caveat', cursive; font-size: 1.6rem; color: var(--wine); line-height: 1; }
.scribble.sm { font-size: 1.2rem; }

/* lipstick kiss — SVG */
.kiss { width: 3.2rem; height: 2.6rem; opacity: 0.85; }
.kiss.sm { width: 2.2rem; height: 1.8rem; }
.kiss path { fill: var(--kiss); }

.foot { margin-top: 2.5rem; padding-top: 1.25rem; border-top: 1px solid var(--rule); font-size: 0.78rem; color: var(--ink-faint); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
.foot .left { font-style: italic; color: var(--ink-soft); }
@media (prefers-reduced-motion: reduce) { .cursor { animation: none; } .desk-item { opacity: 1 !important; animation: none !important; transform: rotate(var(--rot, 0deg)) !important; } html { scroll-behavior: auto; } }
</style>
</head>

<svg width="0" height="0" style="position:absolute"><defs>
  <symbol id="kiss" viewBox="0 0 64 52">
    <path d="M32 14 C 24 4, 10 4, 6 14 C 2 22, 12 30, 32 36 C 52 30, 62 22, 58 14 C 54 4, 40 4, 32 14 Z M32 36 C 28 40, 20 42, 14 40 M32 36 C 36 40, 44 42, 50 40 M22 22 L24 26 M30 22 L32 26 M38 22 L40 26 M46 22 L48 26" stroke="#6e1811" stroke-width="0.8" fill="#b4291f" fill-opacity="0.92"/>
  </symbol>
</defs></svg>

<script>
(function () {
  var target = document.getElementById('typed');
  var paragraphs = [
    ["hi, i'm riya. i write, i build, and right now i'm an investment banking analyst at ", { link: "bank of america", href: "https://www.bankofamerica.com/" }, ", on the consumer & retail team."],
    ["i co-build ", { link: "indiya nyc", href: "./design.html" }, " — sustainable clothing made with block-printers in jaipur — and on the side, angel invest in people i've watched build for years."],
    ["the rest of this page is the short version of the longer one."]
  ];
  var pIdx = 0, chunkIdx = 0, cIdx = 0, currentP = null, cursor = null;
  function ensureCursor() { if (cursor && cursor.parentNode) cursor.parentNode.removeChild(cursor); cursor = document.createElement('span'); cursor.className = 'cursor'; if (currentP) currentP.appendChild(cursor); }
  function startNextParagraph() { currentP = document.createElement('p'); target.appendChild(currentP); chunkIdx = 0; cIdx = 0; ensureCursor(); typeChunk(); }
  function typeChunk() {
    var para = paragraphs[pIdx];
    if (chunkIdx >= para.length) { pIdx++; if (pIdx < paragraphs.length) setTimeout(startNextParagraph, 360); else if (cursor) cursor.classList.add('hidden'); return; }
    var chunk = para[chunkIdx];
    if (typeof chunk === 'string') {
      if (cIdx < chunk.length) { var ch = document.createTextNode(chunk.charAt(cIdx)); currentP.insertBefore(ch, cursor); cIdx++; var d = 18 + (Math.random() * 26 - 8); var lc = chunk.charAt(cIdx - 1); if (lc === '.' || lc === ',' || lc === '?' || lc === '—') d += 90; setTimeout(typeChunk, d); }
      else { chunkIdx++; cIdx = 0; setTimeout(typeChunk, 30); }
    } else { var a = document.createElement('a'); a.href = chunk.href; a.textContent = chunk.link; currentP.insertBefore(a, cursor); chunkIdx++; cIdx = 0; setTimeout(typeChunk, 60); }
  }
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    paragraphs.forEach(function (para) { var p = document.createElement('p'); para.forEach(function (chunk) { if (typeof chunk === 'string') p.appendChild(document.createTextNode(chunk)); else { var a = document.createElement('a'); a.href = chunk.href; a.textContent = chunk.link; p.appendChild(a); } }); target.appendChild(p); }); return;
  }
  startNextParagraph();
})();

(function () {
  var desk = document.getElementById('desk');
  if (!desk) return;
  var P_FABRIC = 'https://sxhodsrixg8meuri.public.blob.vercel-storage.com/workshop/7814764f-32d2-418c-b945-a9336eda76e9/screenshot_2026-05-09_at_3.05.17_am-egEt3Yos5R5VN2jdDwULd4oicLVr2V.png';
  var P_PJ = 'https://sxhodsrixg8meuri.public.blob.vercel-storage.com/workshop/7814764f-32d2-418c-b945-a9336eda76e9/screenshot_2026-05-09_at_3.07.56_am-NFaJH6hVnYc3UrAKp9XIUpbnj7pLYt.png';
  var P_BLOCK = 'https://sxhodsrixg8meuri.public.blob.vercel-storage.com/workshop/7814764f-32d2-418c-b945-a9336eda76e9/screenshot_2026-05-09_at_3.18.47_am-4esuFEHWYuyQb2wWvFoycrkuCl8Top.png';

  // grid-anchored layout: 4 cols x 4 rows, every item lives in its own cell + small jitter
  // x,y are top-left of cell as %; rot in deg; size where applicable
  var items = [
    { kind: 'frame', variant: 'lg', cap: 'fabric district', img: P_FABRIC, x: 4,  y: 2,  rot: -5 },
    { kind: 'note', cls: 'sticky', text: "the family office is the new pe — quietly, then suddenly.", src: 'swan memo', x: 50, y: 4, rot: 4 },
    { kind: 'note', cls: 'craft', text: "capital follows conviction.", src: 'field notes', x: 78, y: 6, rot: -6 },
    { kind: 'kiss', size: '', x: 38, y: 32, rot: -12 },
    { kind: 'frame', variant: 'oval', cap: 'soho mornings', img: P_PJ, x: 30, y: 38, rot: 5 },
    { kind: 'scribble', text: 'write more!', cls: '', x: 62, y: 36, rot: -6 },
    { kind: 'note', cls: 'lined', text: "being the youngest in the room is a superpower if you use it right.", src: 'gen-z book', x: 56, y: 50, rot: 3 },
    { kind: 'kiss', size: 'sm', x: 4, y: 56, rot: 18 },
    { kind: 'frame', variant: 'md', cap: 'jaipur', img: P_BLOCK, x: 4, y: 68, rot: 7 },
    { kind: 'scribble', text: 'xoxo', cls: 'sm', x: 80, y: 72, rot: 12 }
  ];
  var deskW = desk.clientWidth;
  var isNarrow = deskW < 540;

  function buildFrame(item) {
    var fig = document.createElement('figure');
    fig.className = 'desk-item frame ' + item.variant;
    if (item.variant === 'oval') {
      var m = document.createElement('div'); m.className = 'matte';
      var im = document.createElement('img'); im.src = item.img; im.alt = item.cap; im.loading = 'lazy';
      m.appendChild(im); fig.appendChild(m);
    } else {
      var im2 = document.createElement('img'); im2.src = item.img; im2.alt = item.cap; im2.loading = 'lazy'; fig.appendChild(im2);
      if (item.variant === 'lg') {
        ['tl','tr','bl','br'].forEach(function (k) { var c = document.createElement('span'); c.className = 'corner ' + k; fig.appendChild(c); });
      }
    }
    var c = document.createElement('figcaption'); c.className = 'cap'; c.textContent = item.cap; fig.appendChild(c);
    return fig;
  }
  function buildNote(item) { var n = document.createElement('div'); n.className = 'desk-item note ' + item.cls; var t = document.createElement('div'); t.textContent = item.text; var s = document.createElement('span'); s.className = 'src'; s.textContent = item.src; n.appendChild(t); n.appendChild(s); return n; }
  function buildScribble(item) { var n = document.createElement('div'); n.className = 'desk-item scribble' + (item.cls ? ' ' + item.cls : ''); n.textContent = item.text; return n; }
  function buildKiss(item) { var d = document.createElement('div'); d.className = 'desk-item'; var s = document.createElementNS('http://www.w3.org/2000/svg', 'svg'); s.setAttribute('class', 'kiss' + (item.size ? ' ' + item.size : '')); s.setAttribute('viewBox', '0 0 64 52'); var u = document.createElementNS('http://www.w3.org/2000/svg', 'use'); u.setAttribute('href', '#kiss'); s.appendChild(u); d.appendChild(s); return d; }
  var nodes = [];
  items.forEach(function (item, i) {
    var el = item.kind === 'frame' ? buildFrame(item) : item.kind === 'note' ? buildNote(item) : item.kind === 'kiss' ? buildKiss(item) : buildScribble(item);
    var x = item.x, y = item.y;
    if (isNarrow) { x = (i % 2 === 0) ? 4 : 50; y = Math.floor(i / 2) * 11 + 1; }
    el.style.left = x + '%'; el.style.top = y + '%'; el.style.setProperty('--rot', item.rot + 'deg');
    var fx = (Math.random() < 0.5 ? -1 : 1) * (40 + Math.random() * 30);
    var fy = -(60 + Math.random() * 60);
    var fr = (Math.random() < 0.5 ? -1 : 1) * (25 + Math.random() * 35);
    el.style.setProperty('--fx', fx + 'vw'); el.style.setProperty('--fy', fy + 'vh'); el.style.setProperty('--fr', fr + 'deg');
    el.style.zIndex = String(i + 1);
    desk.appendChild(el); nodes.push(el);
  });
  function trigger() { nodes.forEach(function (el, i) { setTimeout(function () { el.classList.add('settled'); }, 250 + i * 110); }); }
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) { nodes.forEach(function (el) { el.classList.add('settled'); }); return; }
  setTimeout(trigger, 600);
})();
</script>
